[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Publish jobs to run in CI (custom workflow at .github/workflows/publish-crates.yml)
publish-jobs = ["./publish-crates"]
# Override default custom-publish permissions (npm-oriented id-token/packages) with what cargo publish needs
github-custom-job-permissions = { "publish-crates" = { contents = "read" } }

# Pin macOS build runners to the latest GA images (Tahoe 26).
#   macos-26       — Apple Silicon (arm64)
#   macos-26-intel — Intel (x86_64); macos-13 x64 image is being retired.
[dist.github-custom-runners]
aarch64-apple-darwin = "macos-26"
x86_64-apple-darwin = "macos-26-intel"
